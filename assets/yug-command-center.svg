      <stop stop-color="#020617"/>
      <stop offset="0.46" stop-color="#07111F"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 115) rotate(135) scale(430 260)">
      <stop stop-color="#22D3EE" stop-opacity="0.42"/>
