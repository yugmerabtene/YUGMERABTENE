      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#1E293B" stroke-opacity="0.38" stroke-width="1"/>
    </pattern>
  </defs>

